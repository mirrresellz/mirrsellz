<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Account</title>

<style>
body { font-family: Arial; margin:0; text-align:center; }

* {
  animation: floatText 2s infinite ease-in-out;
}

@keyframes floatText {
  0% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
  100% { transform: translateY(0); }
}

.header {
  background:black;
  color:white;
  padding:15px;
}

.box {
  margin-top:60px;
}

input {
  padding:10px;
  width:250px;
  margin:10px;
}

.btn {
  padding:10px 18px;
  background:black;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.link {
  display:block;
  margin-top:15px;
  cursor:pointer;
  color:blue;
}
</style>
</head>

<body>

<div class="header">Account</div>

<div class="box">
  <h2>Sign In / Guest Access</h2>

  <input type="email" id="email" placeholder="Email">

  <br>

  <button class="btn" onclick="login()">Sign In</button>
  <button class="btn" onclick="guest()">Continue as Guest</button>

  <div class="link" onclick="goCart()">Go to Cart</div>
</div>

<script>
function login(){
  let email = document.getElementById("email").value;
  if(email){
    localStorage.setItem("user", email);
    alert("Logged in as " + email);
    window.location.href = "cart.html";
  }
}

function guest(){
  localStorage.setItem("user", "guest");
  window.location.href = "cart.html";
}

function goCart(){
  window.location.href = "cart.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<script src="cart.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;}

.card{
  background:#111;margin:10px;padding:10px;border-radius:10px;
}

.btn{
  background:#fff;color:#000;padding:8px;
  border:none;border-radius:8px;cursor:pointer;
}
</style>
</head>

<body>

<h1>Your Cart</h1>

<div id="items"></div>
<h2 id="total"></h2>

<a href="shop.html">Back to Shop</a>
<br><br>

<button class="btn" onclick="location.href='checkout.html'">Checkout</button>
<br><br>
<button class="btn" onclick="clearCart()">Clear Cart</button>

<script>
let cart = getCart();
let box = document.getElementById("items");
let total = 0;

if(cart.length === 0){
  box.innerHTML = "Cart is empty";
}

cart.forEach((item,i)=>{
  total += item.price;

  let div = document.createElement("div");
  div.className="card";
  div.innerHTML = item.name + " - $" + item.price +
  "<br><button onclick='removeItem("+i+")'>Remove</button>";

  box.appendChild(div);
});

document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
</script>

</body>
</html>

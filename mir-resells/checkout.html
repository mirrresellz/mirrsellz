<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.btn{padding:15px;background:white;color:black;border:none;border-radius:10px;}
</style>
</head>

<body>

<h1>Checkout</h1>

<button class="btn" onclick="pay()">Pay Now</button>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function pay(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  // SAVE ORDER
  await db.collection("orders").add({
    cart: cart,
    time: Date.now(),
    user: navigator.userAgent
  });

  // REDIRECT TO STRIPE
  window.location.href = "https://buy.stripe.com/XXXXX";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Checkout</title>

  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=AU1vzS7nHRlBOjty6_yH1BLZOAtRIXCPpjJdQpZTqwSZHi71TCgegp8H5-MbYWzHCHWI1ZywR2vt4w4B&currency=USD"></script>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .stripe {
      background: #635bff;
      color: white;
    }

    #paypal-button-container {
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Card Checkout</h2>
    <p>Total: $14.99</p>

    <!-- STRIPE -->
    <button class="stripe" id="pay-now">
      Pay with Card / Apple Pay
    </button>

    <p style="margin-top:15px;">OR</p>

    <!-- PAYPAL -->
    <div id="paypal-button-container"></div>

    <button onclick="window.location.href='checkout.html'" style="margin-top:15px;">
      ← Back
    </button>
  </div>

  <script>
    // STRIPE
    document.getElementById("pay-now").onclick = async () => {
      const res = await fetch("/.netlify/functions/create-checkout-session", {
        method: "POST"
      });

      const data = await res.json();

      if (data.url) {
        window.location.href = data.url;
      } else {
        alert("Stripe failed");
      }
    };

    // PAYPAL
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: "14.99"
            }
          }]
        });
      },

      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          window.location.href = "success.html";
        });
      }

    }).render('#paypal-button-container');
  </script>

</body>
</html>

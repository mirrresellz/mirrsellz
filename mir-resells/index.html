<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrSellz</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
.page{display:none;padding:20px;}
.active{display:block;}

.card{
  background:#111;margin:15px auto;width:90%;
  max-width:420px;padding:15px;border-radius:12px;
}

img{width:100%;border-radius:10px;}

.btn{
  margin:8px;padding:10px;
  background:#fff;color:#000;
  border:none;border-radius:10px;
  cursor:pointer;
}

.star{font-size:25px;cursor:pointer;}
textarea{width:80%;height:60px;margin-top:10px;}

.review{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<h1>MirrSellz</h1>
<button class="btn" onclick="go('shop')">Enter Shop</button>
</div>

<!-- SHOP -->
<div id="shop" class="page">
<h1>Shop</h1>

<div class="card">
<img src="https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414834/5556325759.jpg">
<h3>Shoe Vendor</h3>
<button class="btn" onclick="openProduct('shoe')">View</button>
<button class="btn" onclick="addToCart('Shoe Vendor',14.99)">Add</button>
</div>

<div class="card">
<img src="https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414832/5556282185.jpg">
<h3>Electronics Vendor</h3>
<button class="btn" onclick="openProduct('electronics')">View</button>
<button class="btn" onclick="addToCart('Electronics Vendor',14.99)">Add</button>
</div>

<div class="card">
<img src="https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414835/5556303283.jpg">
<h3>Clothing Vendor</h3>
<button class="btn" onclick="openProduct('clothing')">View</button>
<button class="btn" onclick="addToCart('Clothing Vendor',14.99)">Add</button>
</div>

<br>
<button class="btn" onclick="go('cart'); loadCart()">View Cart</button>
</div>

<!-- PRODUCT -->
<div id="product" class="page">
<h1 id="productTitle"></h1>
<img id="productImg">

<button class="btn" onclick="addCurrent()">Add to Cart</button>
<br>
<button class="btn" onclick="go('shop')">Back</button>

<h2>Reviews</h2>

<div>
<span class="star" onclick="setRating(1)">⭐</span>
<span class="star" onclick="setRating(2)">⭐</span>
<span class="star" onclick="setRating(3)">⭐</span>
<span class="star" onclick="setRating(4)">⭐</span>
<span class="star" onclick="setRating(5)">⭐</span>
</div>

<textarea id="reviewText"></textarea>
<br>
<button class="btn" onclick="submitReview()">Submit</button>

<div id="reviewList"></div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h1>Your Cart</h1>
<div id="cartItems"></div>
<h2 id="total"></h2>

<button class="btn" onclick="go('shop')">Back</button>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// NAV
function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

// CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added to cart");
}

function loadCart(){
  let box = document.getElementById("cartItems");
  let total = 0;
  box.innerHTML = "";

  cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.forEach(item=>{
    total += item.price;
    let div = document.createElement("div");
    div.className="card";
    div.innerHTML = item.name + " - $" + item.price;
    box.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
}

// PRODUCT
let currentProduct="";
let rating=0;

function openProduct(p){
  currentProduct=p;

  let titles={
    shoe:"Shoe Vendor",
    electronics:"Electronics Vendor",
    clothing:"Clothing Vendor"
  };

  let imgs={
    shoe:"https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414834/5556325759.jpg",
    electronics:"https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414832/5556282185.jpg",
    clothing:"https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414835/5556303283.jpg"
  };

  document.getElementById("productTitle").innerText=titles[p];
  document.getElementById("productImg").src=imgs[p];

  loadReviews();
  go("product");
}

function addCurrent(){
  addToCart(currentProduct,14.99);
}

// REVIEWS (GLOBAL)
function setRating(r){rating=r;}

async function submitReview(){
  let text=document.getElementById("reviewText").value;
  if(rating===0) return alert("Pick rating");

  await db.collection("reviews").add({
    product: currentProduct,
    rating,
    text,
    time: Date.now(),
    user: navigator.userAgent
  });

  document.getElementById("reviewText").value="";
  rating=0;

  loadReviews();
}

async function loadReviews(){
  let list=document.getElementById("reviewList");
  list.innerHTML="";

  let snapshot=await db.collection("reviews")
    .where("product","==",currentProduct)
    .orderBy("time","desc")
    .get();

  snapshot.forEach(doc=>{
    let r=doc.data();

    let div=document.createElement("div");
    div.className="review";
    div.innerHTML="⭐".repeat(r.rating)+"<br>"+r.text+"<br><small>"+r.user+"</small>";

    list.appendChild(div);
  });
}

// 💳 STRIPE PAYMENT LINK (PUT YOUR LINK HERE)
function checkout(){
  window.location.href = "https://buy.stripe.com/XXXXX";
}
</script>

</body>
</html>

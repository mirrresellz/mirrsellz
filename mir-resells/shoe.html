<!DOCTYPE html>
<html>
<head>
<title>Shoe Vendor</title>
<script src="cart.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;}
img{width:90%;max-width:500px;border-radius:12px;}

.box{padding:20px;}

.btn{
  background:white;color:black;
  padding:12px;margin:10px;
  border:none;border-radius:10px;
  cursor:pointer;
}

.review-box{margin-top:30px;}

.star{font-size:25px;cursor:pointer;}

textarea{
  width:80%;
  height:60px;
  margin-top:10px;
}

.review{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>Shoe Vendor</h1>

<img src="https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414834/5556325759.jpg">

<p>High quality 1:1 shoes vendor.</p>
<h2>$14.99</h2>

<button class="btn" onclick="addToCart('Shoe Vendor',14.99)">
Add to Cart
</button>

<br>
<a href="shop.html"><button class="btn">Back</button></a>

<!-- REVIEWS -->
<div class="review-box">

<h2>Reviews</h2>

<div>
<span class="star" onclick="setRating(1)">⭐</span>
<span class="star" onclick="setRating(2)">⭐</span>
<span class="star" onclick="setRating(3)">⭐</span>
<span class="star" onclick="setRating(4)">⭐</span>
<span class="star" onclick="setRating(5)">⭐</span>
</div>

<textarea id="reviewText" placeholder="Write a review..."></textarea>
<br>

<button class="btn" onclick="submitReview()">Submit Review</button>

<div id="reviewList"></div>

</div>

</div>

<script>
let rating = 0;
let product = "shoe";

function setRating(r){
  rating = r;
}

function submitReview(){
  let text = document.getElementById("reviewText").value;

  if(rating === 0){
    alert("Select a rating");
    return;
  }

  let reviews = JSON.parse(localStorage.getItem(product)) || [];

  reviews.push({rating, text});

  localStorage.setItem(product, JSON.stringify(reviews));

  document.getElementById("reviewText").value = "";
  rating = 0;

  loadReviews();
}

function loadReviews(){
  let reviews = JSON.parse(localStorage.getItem(product)) || [];
  let list = document.getElementById("reviewList");

  list.innerHTML = "";

  reviews.forEach(r=>{
    let div = document.createElement("div");
    div.className = "review";
    div.innerHTML = "⭐".repeat(r.rating) + "<br>" + r.text;
    list.appendChild(div);
  });
}

loadReviews();
</script>

</body>
</html>

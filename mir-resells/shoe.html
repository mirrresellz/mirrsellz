<!DOCTYPE html>
<html>
<head>
<title>Shoe Vendor</title>

<script src="cart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.review{background:#111;margin:10px;padding:10px;border-radius:10px;}
.star{cursor:pointer;font-size:25px;}
</style>
</head>

<body>

<h1>Shoe Vendor</h1>

<button onclick="addToCart('Shoe Vendor',14.99)">Add to Cart</button>

<h2>Reviews</h2>

<div>
<span class="star" onclick="setRating(1)">⭐</span>
<span class="star" onclick="setRating(2)">⭐</span>
<span class="star" onclick="setRating(3)">⭐</span>
<span class="star" onclick="setRating(4)">⭐</span>
<span class="star" onclick="setRating(5)">⭐</span>
</div>

<textarea id="reviewText"></textarea><br>
<button onclick="submitReview()">Submit</button>

<div id="reviews"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rating = 0;

function setRating(r){ rating = r; }

async function submitReview(){
  let text = document.getElementById("reviewText").value;

  await db.collection("reviews").add({
    product: "shoe",
    rating,
    text,
    time: Date.now(),
    user: navigator.userAgent
  });

  loadReviews();
}

async function loadReviews(){
  let container = document.getElementById("reviews");
  container.innerHTML = "";

  let snap = await db.collection("reviews")
    .where("product","==","shoe")
    .get();

  snap.forEach(doc=>{
    let r = doc.data();
    container.innerHTML += "⭐".repeat(r.rating) + "<br>" + r.text + "<hr>";
  });
}

loadReviews();
</script>

</body>
</html>

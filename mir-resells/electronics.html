<!DOCTYPE html>
<html>
<head>
<title>Electronics Vendor</title>
<script src="cart.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;}
img{width:90%;max-width:500px;border-radius:12px;}
.box{padding:20px;}
.btn{background:white;color:black;padding:12px;margin:10px;border:none;border-radius:10px;}
.star{font-size:25px;cursor:pointer;}
textarea{width:80%;height:60px;margin-top:10px;}
.review{background:#111;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="box">

<h1>Electronics Vendor</h1>

<img src="https://d2j6dbq0eux0bg.cloudfront.net/images/126254004/products/794414832/5556282185.jpg">

<p>Top electronics vendor.</p>
<h2>$14.99</h2>

<button class="btn" onclick="addToCart('Electronics Vendor',14.99)">Add to Cart</button>

<br>
<a href="shop.html"><button class="btn">Back</button></a>

<h2>Reviews</h2>

<div>
<span class="star" onclick="setRating(1)">⭐</span>
<span class="star" onclick="setRating(2)">⭐</span>
<span class="star" onclick="setRating(3)">⭐</span>
<span class="star" onclick="setRating(4)">⭐</span>
<span class="star" onclick="setRating(5)">⭐</span>
</div>

<textarea id="reviewText"></textarea>
<br>
<button class="btn" onclick="submitReview()">Submit</button>

<div id="reviewList"></div>

</div>

<script>
let rating = 0;
let product = "electronics";

function setRating(r){ rating = r; }

function submitReview(){
  let text = document.getElementById("reviewText").value;
  if(rating === 0) return alert("Pick rating");

  let reviews = JSON.parse(localStorage.getItem(product)) || [];
  reviews.push({rating, text});
  localStorage.setItem(product, JSON.stringify(reviews));

  document.getElementById("reviewText").value="";
  rating=0;

  loadReviews();
}

function loadReviews(){
  let reviews = JSON.parse(localStorage.getItem(product)) || [];
  let list = document.getElementById("reviewList");
  list.innerHTML="";

  reviews.forEach(r=>{
    let div=document.createElement("div");
    div.className="review";
    div.innerHTML="⭐".repeat(r.rating)+"<br>"+r.text;
    list.appendChild(div);
  });
}

loadReviews();
</script>

</body>
</html>
